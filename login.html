<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dúos — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F7F2EC;
      --cream-dark:  #EDE5D8;
      --brown-light: #C4A882;
      --brown:       #8B6343;
      --brown-dark:  #5C3D1E;
      --blue:        #2C4A7C;
      --blue-mid:    #3D6494;
      --blue-light:  #D6E4F7;
      --blue-pale:   #EBF2FB;
      --white:       #FFFFFF;
      --text:        #2A1F14;
      --text-mid:    #6B5744;
      --text-muted:  #9B8878;
      --error:       #C0392B;
      --error-bg:    #FDF0EF;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      border-bottom: 1px solid var(--cream-dark);
      background: var(--cream);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--blue);
      text-decoration: none;
    }
    .logo span { color: var(--brown); }

    .nav-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .form-card {
      background: var(--white);
      border: 1px solid var(--cream-dark);
      border-radius: 24px;
      padding: 2.5rem 2.75rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 32px rgba(44,74,124,0.07);
    }

    .form-eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 0.5rem;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .form-title em { font-style: italic; color: var(--blue); }

    .form-subtitle {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-mid);
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text);
      background: var(--cream);
      border: 1.5px solid var(--cream-dark);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }
    input:focus {
      border-color: var(--blue);
      background: var(--white);
    }
    input::placeholder { color: var(--text-muted); }

    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 3rem; }
    .pass-toggle {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'Jost', sans-serif;
      padding: 0;
    }
    .pass-toggle:hover { color: var(--text); }

    .error-box {
      display: none;
      background: var(--error-bg);
      border: 1px solid #F1C0BC;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: var(--error);
      margin-bottom: 1.25rem;
    }

    .btn-submit {
      width: 100%;
      font-family: 'Jost', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--white);
      background: var(--blue);
      border: none;
      padding: 0.95rem;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(44,74,124,0.2);
    }
    .btn-submit:hover { background: var(--blue-mid); transform: translateY(-1px); }
    .btn-submit:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cream-dark);
    }
    .divider span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-register {
      width: 100%;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--brown);
      background: none;
      border: 1.5px solid var(--brown-light);
      padding: 0.85rem;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-register:hover { border-color: var(--brown); color: var(--brown-dark); }

    .form-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 500px) {
      nav { padding: 1rem 1.25rem; }
      .form-card { padding: 1.75rem 1.25rem; border-radius: 16px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Dú<span>os</span></a>
    <a href="register.html" class="nav-link">¿Aún no estáis? Registraos</a>
  </nav>

  <main>
    <div class="form-card">

      <div class="form-eyebrow">Bienvenidos de vuelta</div>
      <h1 class="form-title">Entrar a <em>Dúos</em></h1>
      <p class="form-subtitle">Introducid vuestro correo y contraseña para acceder a la comunidad.</p>

      <div class="error-box" id="error-box"></div>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="vuestro@email.com" required />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="password" placeholder="Vuestra contraseña" required />
          <button type="button" class="pass-toggle" onclick="togglePass()">ver</button>
        </div>
      </div>

      <button class="btn-submit" id="btn-submit" onclick="handleLogin()">
        Entrar
      </button>

      <div class="divider"><span>¿Aún no estáis en Dúos?</span></div>

      <a href="register.html" class="btn-register">Solicitar inscripción</a>

      <p class="form-footer">
        Comunidad privada para parejas de Madrid · 47 a 60 años
      </p>

    </div>
  </main>

  <script>
    function togglePass() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.pass-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'ocultar';
      } else {
        input.type = 'password';
        btn.textContent = 'ver';
      }
    }

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const btn   = document.getElementById('btn-submit');
      const errorBox = document.getElementById('error-box');

      errorBox.style.display = 'none';

      if (!email || !email.includes('@')) {
        return showError('Por favor, introducid un correo electrónico válido.');
      }
      if (!pass) {
        return showError('Por favor, introducid vuestra contraseña.');
      }

      // TODO: conectar con Firebase Auth
      btn.textContent = 'Entrando...';
      btn.disabled = true;

      // Simulación (quitar cuando se conecte Firebase)
      setTimeout(() => {
        window.location.href = 'feed.html';
      }, 1000);
    }

    // Enter para enviar
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
      const btn = document.getElementById('btn-submit');
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  </script>

</body>
</html>
